    </linearGradient>
  </defs>

  <rect width="880" height="210" rx="16" fill="url(#bg)" stroke="#1e293b"/>
  <text x="28" y="42" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="600" fill="#2dd4bf" letter-spacing="2">STACK</text>

